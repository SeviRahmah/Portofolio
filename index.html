<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sevi Rahmah - Mobile Optimized</title>

<style>
body {font-family: Arial; margin:0;}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
  color:#fff;
  position:fixed;
  width:100%;
  top:0;
}

.nav-links {
  display:flex;
  gap:15px;
}

.nav-links a {
  color:white;
  text-decoration:none;
}

.menu-toggle {
  display:none;
  cursor:pointer;
}

/* HERO */
.hero {
  padding:100px 20px;
}

/* MOBILE */
@media (max-width:768px){
  .menu-toggle {display:block;}

  .nav-links {
    position:fixed;
    top:60px;
    right:-100%;
    flex-direction:column;
    background:#222;
    width:70%;
    height:100%;
    padding:20px;
    transition:0.3s;
  }

  .nav-links.open {right:0;}
}
</style>
</head>

<body>

<nav>
  <div>SEVI</div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="nav">
    <a href="#">Beranda</a>
    <a href="#">Pendidikan</a>
    <a href="#">Prestasi</a>
    <a href="#">Pengalaman</a>
    <a href="#">Kontak</a>
  </div>
</nav>

<div class="hero">
  <h1>Mobile Version Ready ✅</h1>
  <p>Website sudah dioptimalkan untuk mobile.</p>
</div>

<script>
function toggleMenu(){
  document.getElementById('nav').classList.toggle('open');
}
</script>

</body>
</html>
